<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 820 388" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>TokenOps test agent integration</title>
  <defs>
    <marker id="m" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="g" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Grid: col L cx=180, col R cx=640 | inner x L=68 R=528 w=224 | gov bottom=248 | a2a y=280 | plane top=318 -->

  <rect width="820" height="388" fill="#ffffff"/>

  <text x="40" y="36" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#0f172a">Research + Summarize (A2A)</text>
  <text x="40" y="56" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">TokenOps governs LLM and tool boundaries per agent. Shared run_id across both.</text>

  <!-- RESEARCH -->
  <rect x="40" y="72" width="280" height="232" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="56" y="94" font-family="system-ui, sans-serif" font-size="10" letter-spacing="1" fill="#94a3b8">RESEARCH AGENT</text>

  <rect x="56" y="104" width="248" height="144" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="68" y="120" font-family="system-ui, sans-serif" font-size="9" font-weight="700" letter-spacing="0.8" fill="#2563eb">TOKENOPS GOVERNED</text>

  <text x="68" y="140" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#64748b">LLM</text>
  <rect x="68" y="146" width="224" height="36" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="180" y="169" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e40af" text-anchor="middle">wrap_complete</text>

  <text x="68" y="196" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#64748b">TOOL</text>
  <rect x="68" y="202" width="224" height="36" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="180" y="225" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e40af" text-anchor="middle">@boundary search</text>

  <text x="68" y="256" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#94a3b8">A2A</text>
  <rect x="68" y="262" width="224" height="32" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="180" y="283" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#64748b" text-anchor="middle">delegate to summarize</text>

  <!-- SUMMARIZE -->
  <rect x="500" y="72" width="280" height="232" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="516" y="94" font-family="system-ui, sans-serif" font-size="10" letter-spacing="1" fill="#94a3b8">SUMMARIZE AGENT</text>

  <rect x="516" y="104" width="248" height="144" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="528" y="120" font-family="system-ui, sans-serif" font-size="9" font-weight="700" letter-spacing="0.8" fill="#2563eb">TOKENOPS GOVERNED</text>

  <text x="528" y="140" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#64748b">LLM</text>
  <rect x="528" y="146" width="224" height="36" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="640" y="169" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e40af" text-anchor="middle">wrap_complete</text>

  <text x="528" y="256" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#94a3b8">OUTPUT</text>
  <rect x="528" y="262" width="224" height="32" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="640" y="283" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#64748b" text-anchor="middle">summary text</text>

  <!-- A2A: y=280, inner right 292 to inner left 528 -->
  <rect x="346" y="266" width="128" height="16" rx="3" fill="#ffffff"/>
  <text x="410" y="278" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">shared run_id</text>
  <line x1="292" y1="280" x2="528" y2="280" stroke="#64748b" stroke-width="1.5" marker-end="url(#g)"/>

  <!-- Control plane: centered, spans both columns -->
  <rect x="100" y="318" width="620" height="48" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="410" y="338" font-family="system-ui, sans-serif" font-size="10" letter-spacing="1" fill="#6366f1" text-anchor="middle">TOKENOPS CONTROL PLANE</text>
  <text x="410" y="354" font-family="system-ui, sans-serif" font-size="12" fill="#312e81" text-anchor="middle">Governor / Ledger / Policies / Dashboard</text>

  <!-- Vertical connectors: governed bottom 248 to plane top 318, column centers -->
  <line x1="180" y1="248" x2="180" y2="318" stroke="#2563eb" stroke-width="2" marker-end="url(#m)"/>
  <line x1="640" y1="248" x2="640" y2="318" stroke="#2563eb" stroke-width="2" marker-end="url(#m)"/>

  <!-- Bus lines from column centers to plane top (optional visual tie) -->
  <line x1="180" y1="318" x2="640" y2="318" stroke="#6366f1" stroke-width="1" opacity="0.35"/>
</svg>
